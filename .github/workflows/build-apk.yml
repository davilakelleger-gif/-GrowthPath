name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.29.0

      - name: Generate Android scaffolding
        run: |
          set -eux  # fail-fast, verbose
          TEMP_PROJECT=/tmp/growthpath_temp_app
          FLUTTER_DIR="$GITHUB_WORKSPACE/flutter_app"
          flutter create --project-name growthpath_temp --platforms android "$TEMP_PROJECT"
          # Remove and re-create android scaffold entirely
          rm -rf "$FLUTTER_DIR/android"
          mkdir -p "$FLUTTER_DIR/android/app/src/main"
          # Copy everything from the template project's android/
          cp -av "$TEMP_PROJECT/android/" "$FLUTTER_DIR/android/"
          cd "$FLUTTER_DIR"
          # Fix package name
          sed -i 's/com\.example\.growthpath_temp/com.growthpath.app/g' android/app/build.gradle
          sed -i 's/com\.example\.growthpath_temp/com.growthpath.app/g' android/app/src/main/AndroidManifest.xml
          chmod +x android/gradlew

      - name: Accept licenses
        run: yes | flutter doctor --android-licenses

      - name: Get dependencies
        run: flutter pub get
        working-directory: flutter_app

      - name: Build APK
        run: flutter build apk --release
        working-directory: flutter_app

      - uses: actions/upload-artifact@v4
        with:
          name: growthpath-apk
          path: flutter_app/build/app/outputs/flutter-apk/*.apk
