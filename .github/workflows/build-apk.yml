name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.29.0

      - name: Generate Android scaffolding
        run: |
          cd /tmp
          flutter create --project-name growthpath_temp --platforms android temp_app
          cd "$GITHUB_WORKSPACE/flutter_app"
          # Copy gradle wrapper (scripts + jar)
          mkdir -p android/app/src/main
          cp -v /tmp/temp_app/android/gradlew android/
          cp -v /tmp/temp_app/android/gradlew.bat android/
          cp -rv /tmp/temp_app/android/gradle android/
          cp -v /tmp/temp_app/android/app/build.gradle android/app/
          cp -v /tmp/temp_app/android/app/src/main/AndroidManifest.xml android/app/src/main/
          # Ensure executable
          chmod +x android/gradlew
          # Fix package name
          sed -i 's/com\.example\.growthpath_temp/com.growthpath.app/g' android/app/build.gradle
          sed -i 's/com\.example\.growthpath_temp/com.growthpath.app/g' android/app/src/main/AndroidManifest.xml

      - name: Accept licenses
        run: yes | flutter doctor --android-licenses

      - name: Get dependencies
        run: flutter pub get
        working-directory: flutter_app

      - name: Build APK
        run: flutter build apk --release
        working-directory: flutter_app

      - uses: actions/upload-artifact@v4
        with:
          name: growthpath-apk
          path: flutter_app/build/app/outputs/flutter-apk/*.apk
